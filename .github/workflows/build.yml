name: Build Geode Mod

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            platform: windows

          - name: Android32
            os: ubuntu-latest
            platform: android32

          - name: Android64
            os: ubuntu-latest
            platform: android64

          - name: macOS
            os: macos-latest
            platform: macos

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: nightly
          build-args: --platform ${{ matrix.config.platform }}
          export-pdb: true
