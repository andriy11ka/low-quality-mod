name: Build Geode Mod

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Android32
            os: ubuntu-latest
            target: Android32

          - name: Android64
            os: ubuntu-latest
            target: Android64

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: actions/checkout@v4.1.7

      - name: Build the mod
        uses: geode-sdk/build-geode-mod@main
        with:
          sdk: latest
          target: ${{ matrix.config.target }}
          export-pdb: true
